# docker-compose.yml · stack do QG
#
# Serviços:
#   - anythingllm: chat multi-usuário com IA (porta 3001 interna · expõe via Caddy)
#   - postgres:    DB principal + pgvector pra embeddings
#   - redis:       filas e locks
#   - caddy:       reverse proxy + TLS automático (portas 80, 443)
#
# Volumes em /opt/qg/data/* (criados pelo bootstrap.sh)
#
# Requer arquivo .env preenchido (copie de .env.example)

services:
  caddy:
    image: caddy:2-alpine
    container_name: qg-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/qg/data/caddy/data:/data
      - /opt/qg/data/caddy/config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - EMAIL_TLS=${EMAIL_TLS}
    depends_on:
      - anythingllm
    networks:
      - qg-net

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: qg-anythingllm
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      - SERVER_PORT=3001
      - STORAGE_DIR=/app/server/storage
      - UID=1000
      - GID=1000
      - JWT_SECRET=${ANYTHINGLLM_JWT_SECRET}
      - SIG_KEY=${ANYTHINGLLM_SIG_KEY}
      - SIG_SALT=${ANYTHINGLLM_SIG_SALT}
      # LLM provider · Claude API
      - LLM_PROVIDER=anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL_PREF=claude-sonnet-4-6
      # Vector DB · usaremos pgvector via Postgres
      - VECTOR_DB=pgvector
      - PGVECTOR_CONNECTION_STRING=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Embedding provider · TBD na decisão arquitetural · default Anthropic
      - EMBEDDING_ENGINE=native
    volumes:
      - /opt/qg/data/anythingllm:/app/server/storage
      - /opt/qg/data/anythingllm/hotdir:/app/collector/hotdir
      - /opt/qg/data/anythingllm/outputs:/app/collector/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - qg-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: pgvector/pgvector:pg16
    container_name: qg-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - /opt/qg/data/postgres:/var/lib/postgresql/data
    networks:
      - qg-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qg-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - /opt/qg/data/redis:/data
    networks:
      - qg-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MCPs custom virão como serviços adicionais aqui · ex:
  #
  # whatsapp-mcp:
  #   build: ../mcps/whatsapp
  #   container_name: qg-whatsapp-mcp
  #   restart: unless-stopped
  #   environment:
  #     - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
  #     - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
  #     - DATABASE_URL=postgresql://...
  #   networks:
  #     - qg-net
  #
  # notion-sync:
  #   build: ../mcps/notion-sync
  #   container_name: qg-notion-sync
  #   restart: unless-stopped
  #   environment:
  #     - NOTION_API_TOKEN=${NOTION_API_TOKEN}
  #     - NOTION_WORKSPACE_PAGE_ID=${NOTION_WORKSPACE_PAGE_ID}
  #     - DATABASE_URL=postgresql://...
  #   networks:
  #     - qg-net

networks:
  qg-net:
    driver: bridge
